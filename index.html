<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kean Moscoso | Welcome to My Portfolio</title>
    <link href="src/assests/css/styles.css" rel="stylesheet">
    <link rel="icon" href="src/assests/media/pics/portfolio.png" type="image/icon type">
</head>
<body>
   
    <main>
        <div id="particles-js"></div>
        <section class="intro show-animated">
            <h1>Welcome to <span class="galaxy-text">My Portfolio</span></h1>
          </div>
          <div class="button-container-3">
             <button class="btn-click"  type="button" name="Hover" onclick="goToPage('/Home')">Go to Home Page</button>
            </div>
      </div>
        </section>
    </main>
   
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
       // Particles
        if (typeof particlesJS !== 'undefined') {
            particlesJS("particles-js", {
                particles: {
                    number: { value: 55, density: { enable: true, value_area: 900 } },
                    color: { value: ["#ffffff", "#ffffff", "#ffffff"] },
                    shape: { type: "circle" },
                    opacity: { value: 0.35, random: true, anim: { enable: true, speed: 0.6, opacity_min: 0.05, sync: false } },
                    size: { value: 5, random: true },
                    line_linked: { enable: true, distance: 140, color: "#ffffff", opacity: 0.07, width: 1 },
                    move: { enable: true, speed: 0.7, direction: "none", random: true, straight: false, out_mode: "out" }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: false }, resize: true },
                    modes: { repulse: { distance: 80, duration: 0.4 } }
                },
                retina_detect: true
            });
        }
    </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="src/assests/js/Script.js"></script>
    
</body>
</html>
